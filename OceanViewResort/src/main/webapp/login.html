<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ocean View Resort</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --sand: #f0e8d8;
            --sand-light: #f8f3eb;
            --ocean: #1a3a4a;
            --ocean-deep: #0d2433;
            --gold: #c9a96e;
            --gold-light: #e8c99a;
            --white: #ffffff;
            --err: #e05c5c;
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            font-family: 'Jost', sans-serif;
            background: var(--ocean-deep);
            display: flex;
            height: 100vh;
        }

        /* ─── LEFT IMAGE PANEL ─── */
        .bg-col {
            position: relative;
            width: 42%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .bg-img {
            position: absolute; inset: 0;
            background: url('https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?ixlib=rb-4.0.3&auto=format&fit=crop&w=900&q=80') center/cover no-repeat;
            animation: slowZoom 18s ease-in-out infinite alternate;
        }

        @keyframes slowZoom {
            from { transform: scale(1.04); }
            to   { transform: scale(1.10); }
        }

        .bg-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(160deg, rgba(13,36,51,.72), rgba(26,58,74,.55), rgba(13,36,51,.85));
        }

        .bg-content {
            position: relative; z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px 52px;
        }

        .back-link {
            display: inline-flex; align-items: center; gap: 8px;
            font-size: 0.95rem; /* 0.72 -> 0.95 */
            font-weight: 300; letter-spacing: 0.15em;
            text-transform: uppercase; color: rgba(240,232,216,.6);
            text-decoration: none; transition: color .2s;
        }
        .back-link:hover { color: var(--gold); }
        .back-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.8; }

        .bg-quote { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 10px; }

        .quote-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 3.5vw, 3.5rem); /* ලොකු කළා */
            font-weight: 300; font-style: italic;
            color: var(--white); line-height: 1.3; margin-bottom: 20px;
        }

        .quote-attr {
            font-size: 0.9rem; /* 0.7 -> 0.9 */
            letter-spacing: 0.2em; text-transform: uppercase;
            color: var(--gold); display: flex; align-items: center; gap: 12px;
        }
        .quote-attr::before { content: ''; display: block; width: 28px; height: 1px; background: var(--gold); }

        .bg-footer { font-size: 0.85rem; /* 0.68 -> 0.85 */ letter-spacing: 0.08em; color: rgba(240,232,216,.4); }

        /* ─── RIGHT FORM PANEL ─── */
        .form-col {
            flex: 1;
            background: var(--sand-light);
            display: flex; align-items: center; justify-content: center;
            padding: 60px 72px;
            position: relative; overflow: hidden;
        }

        .form-col::before {
            content: ''; position: absolute; bottom: -80px; right: -80px;
            width: 320px; height: 320px; border-radius: 50%;
            border: 1px solid rgba(201,169,110,.12); pointer-events: none;
        }
        .form-col::after {
            content: ''; position: absolute; bottom: -180px; right: -180px;
            width: 480px; height: 480px; border-radius: 50%;
            border: 1px solid rgba(201,169,110,.07); pointer-events: none;
        }

        .form-wrap {
            width: 100%; max-width: 420px; /* 360 -> 420 අකුරු ලොකු නිසා පලල් කළා */
            position: relative; z-index: 1;
            animation: riseIn .7s cubic-bezier(.22,1,.36,1) .15s both;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-brand {
            display: flex; align-items: center; gap: 10px; margin-bottom: 40px;
        }
        .form-brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); }
        .form-brand-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem; /* 0.95 -> 1.2 */
            font-weight: 300; letter-spacing: 0.22em;
            text-transform: uppercase; color: var(--ocean-deep);
        }

        h1.form-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.0rem; /* 2.4 -> 3.0 */
            font-weight: 400;
            color: var(--ocean-deep); line-height: 1.1; margin-bottom: 6px;
        }
        .form-subtitle {
            font-size: 1.1rem; /* 0.8 -> 1.1 */
            font-weight: 300; color: #8fa0ac;
            letter-spacing: 0.03em; margin-bottom: 36px;
        }

        /* ─── ERROR BANNER ─── */
        #errorBox {
            display: none; align-items: center; gap: 10px;
            background: #fff0f0; border: 1px solid rgba(224,92,92,.25);
            border-radius: 9px; padding: 13px 16px; margin-bottom: 22px;
            font-size: 0.95rem; /* 0.78 -> 0.95 */
            font-weight: 300; color: #c0392b;
        }
        #errorBox.visible { display: flex; }
        #errorBox svg { width: 18px; height: 18px; stroke: var(--err); fill: none; stroke-width: 2; flex-shrink: 0; }

        /* ─── FORM FIELDS ─── */
        .field-group { margin-bottom: 20px; }

        .field-label {
            display: block; font-size: 0.85rem; /* 0.68 -> 0.85 */
            font-weight: 500;
            letter-spacing: 0.14em; text-transform: uppercase;
            color: #6b8090; margin-bottom: 8px;
        }

        .field-wrap { position: relative; }

        .field-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            width: 18px; height: 18px;
            stroke: var(--ocean); fill: none; stroke-width: 1.6;
            stroke-linecap: round; stroke-linejoin: round;
            pointer-events: none; opacity: .45; transition: opacity .2s;
        }
        .field-wrap:focus-within .field-icon { opacity: 1; stroke: var(--gold); }

        .toggle-pw {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer; padding: 4px;
            display: flex; align-items: center; justify-content: center;
            opacity: .35; transition: opacity .2s;
        }
        .toggle-pw:hover { opacity: .85; }
        .toggle-pw svg { width: 19px; height: 19px; stroke: var(--ocean); fill: none; stroke-width: 1.6; }

        input[type=text],
        input[type=password] {
            width: 100%;
            padding: 15px 16px 15px 46px;
            border: 1.5px solid rgba(26,58,74,.14);
            border-radius: 10px;
            background: var(--white);
            font-family: 'Jost', sans-serif;
            font-size: 1.1rem; /* 0.9 -> 1.1 */
            font-weight: 300;
            color: var(--ocean-deep);
            outline: none;
            transition: border-color .2s, box-shadow .2s;
            -webkit-appearance: none;
        }
        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(201,169,110,.12);
        }
        input.is-error { border-color: var(--err) !important; box-shadow: 0 0 0 3px rgba(224,92,92,.1) !important; }
        input::placeholder { color: #b0bec5; }

        /* ─── REMEMBER ROW ─── */
        .remember-row {
            display: flex; align-items: center;
            margin-bottom: 28px;
        }

        .check-label {
            display: flex; align-items: center; gap: 9px;
            cursor: pointer; font-size: 0.95rem; /* 0.78 -> 0.95 */
            font-weight: 300; color: #7a8e9a;
            user-select: none;
        }
        .check-label input[type=checkbox] { display: none; }
        .check-box {
            width: 18px; height: 18px; border-radius: 5px;
            border: 1.5px solid rgba(26,58,74,.2);
            background: var(--white); flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            transition: border-color .2s, background .2s;
        }
        .check-label input:checked + .check-box { background: var(--ocean-deep); border-color: var(--ocean-deep); }
        .check-box svg { width: 10px; height: 10px; stroke: white; fill: none; stroke-width: 2.5; display: none; }
        .check-label input:checked + .check-box svg { display: block; }

        /* ─── SUBMIT BUTTON ─── */
        #loginBtn {
            width: 100%; padding: 16px;
            background: var(--ocean-deep); color: var(--sand);
            border: none; border-radius: 10px; cursor: pointer;
            font-family: 'Jost', sans-serif;
            font-size: 1.1rem; /* 0.88 -> 1.1 */
            font-weight: 400;
            letter-spacing: 0.12em; text-transform: uppercase;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: background .25s, transform .15s, box-shadow .25s;
        }
        #loginBtn:hover:not(:disabled) {
            background: var(--ocean);
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(13,36,51,.25);
        }
        #loginBtn:active { transform: translateY(0); }
        #loginBtn:disabled { opacity: .65; cursor: not-allowed; transform: none !important; }

        .btn-arrow {
            width: 18px; height: 18px;
            stroke: var(--gold-light); fill: none; stroke-width: 1.8; stroke-linecap: round;
            transition: transform .2s; flex-shrink: 0;
        }
        #loginBtn:hover:not(:disabled) .btn-arrow { transform: translateX(3px); }

        .spinner {
            width: 16px; height: 16px;
            border: 2px solid rgba(240,232,216,.3);
            border-top-color: var(--gold-light);
            border-radius: 50%;
            animation: spin .6s linear infinite;
            display: none; flex-shrink: 0;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .form-bottom {
            margin-top: 32px; text-align: center;
            font-size: 0.9rem; /* 0.7 -> 0.9 */
            font-weight: 300; color: #aab8c2; letter-spacing: 0.04em;
        }

        @media (max-width: 820px) {
            html, body { height: auto; overflow: auto; }
            body { flex-direction: column; }
            .bg-col { width: 100%; height: 240px; flex-shrink: 0; }
            .form-col { padding: 40px 28px; }
        }
    </style>
</head>
<body>

<div class="bg-col">
    <div class="bg-img"></div>
    <div class="bg-overlay"></div>
    <div class="bg-content">

        <a href="home.html" class="back-link">
            <svg viewBox="0 0 16 16"><path d="M10 3L5 8l5 5"/></svg>
            Back to Home
        </a>

        <div class="bg-quote">
            <p class="quote-text">"Every great stay begins with a seamless arrival."</p>
            <span class="quote-attr">Ocean View Resort</span>
        </div>

        <p class="bg-footer">Secure · Encrypted · Internal Use Only</p>

    </div>
</div>

<div class="form-col">
    <div class="form-wrap">

        <div class="form-brand">
            <div class="form-brand-dot"></div>
            <span class="form-brand-name">Ocean View Resort</span>
        </div>

        <h1 class="form-title">Welcome back,</h1>
        <p class="form-subtitle">Sign in to continue to the staff portal</p>

        <div id="errorBox">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg>
            <span id="errorMsg">Invalid Username or Password!</span>
        </div>

        <form id="loginForm">

            <div class="field-group">
                <label class="field-label" for="username">Username</label>
                <div class="field-wrap">
                    <svg class="field-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="8" r="4"/>
                        <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
                </div>
            </div>

            <div class="field-group">
                <label class="field-label" for="password">Password</label>
                <div class="field-wrap">
                    <svg class="field-icon" viewBox="0 0 24 24">
                        <rect x="3" y="11" width="18" height="11" rx="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
                    <button type="button" class="toggle-pw" id="togglePw" title="Show / hide password">
                        <svg viewBox="0 0 24 24">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="remember-row">
                <label class="check-label">
                    <input type="checkbox" id="remember">
                    <span class="check-box">
                        <svg viewBox="0 0 10 10"><polyline points="1.5,5 4,7.5 8.5,2.5"/></svg>
                    </span>
                    Remember me
                </label>
            </div>

            <button type="submit" id="loginBtn">
                <span id="btnLabel">Login to System</span>
                <span class="spinner" id="btnSpinner"></span>
                <svg class="btn-arrow" id="btnArrow" viewBox="0 0 16 16">
                    <path d="M3 8h10M9 4l4 4-4 4"/>
                </svg>
            </button>

        </form>

    </div>
</div>

<script>
    // Toggle password visibility
    document.getElementById("togglePw").addEventListener("click", function () {
        var pw = document.getElementById("password");
        pw.type = (pw.type === "password") ? "text" : "password";
    });

    // Clear error styling on input
    ["username", "password"].forEach(function (id) {
        document.getElementById(id).addEventListener("input", function () {
            this.classList.remove("is-error");
            document.getElementById("errorBox").classList.remove("visible");
        });
    });

    // Submit Handler
    document.getElementById("loginForm").addEventListener("submit", function (event) {
        event.preventDefault(); // Prevent page reload

        var usernameInput = document.getElementById("username").value;
        var passwordInput = document.getElementById("password").value;
        var errorBox      = document.getElementById("errorBox");
        var loginBtn      = document.getElementById("loginBtn");

        // Set button to loading state
        document.getElementById("btnLabel").textContent    = "Authenticating…";
        document.getElementById("btnSpinner").style.display = "block";
        document.getElementById("btnArrow").style.display   = "none";
        loginBtn.disabled = true;
        errorBox.classList.remove("visible");

        // Data to send to Backend API
        var loginData = {
            username: usernameInput,
            password: passwordInput
        };

        // Call the Java REST API for Authentication
        fetch("https://localhost:8181/OceanViewResort/resources/auth/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(loginData)
        })
        .then(function (response) {
            if (response.ok) { return response.json(); }
            throw new Error("Invalid Username or Password!");
        })
        .then(function (data) {
            // Save the user data in Session Storage
            sessionStorage.setItem("loggedInUser", data.username || data.name || "User");
            sessionStorage.setItem("userRole", data.role); 

            // Redirect to Dashboard
            window.location.href = "dashboard.html";
        })
        .catch(function (error) {
            // Show error message
            document.getElementById("errorMsg").textContent = error.message;
            errorBox.classList.add("visible");

            // Highlight error fields
            document.getElementById("username").classList.add("is-error");
            document.getElementById("password").classList.add("is-error");

            // Reset button
            document.getElementById("btnLabel").textContent    = "Login to System";
            document.getElementById("btnSpinner").style.display = "none";
            document.getElementById("btnArrow").style.display   = "inline";
            loginBtn.disabled = false;
        });
    });
</script>

</body>
</html>
